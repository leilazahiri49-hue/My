};

// --- NEW: Dynamic Description Generator ---
function generateDynamicDescription(personaId, traits) {
  const profile = personalityProfiles[personaId];
  let desc = profile.base + " ";

  // 1. Acknowledge their current life stage & energy
  const isStudent = traits.some(t => academicLifeTraits.has(t));
  const isWorking = traits.some(t => workingLifeTraits.has(t));
  
  const isBurntOut = traits.includes("energy_burnt_out") || traits.includes("energy_empty") || traits.includes("struggling");
  const isHappy = traits.includes("energy_great") || traits.includes("growth_oriented");
  const isOkay = traits.includes("energy_okay");

  if (isHappy) {
    desc += "Since you're feeling good and looking to grow, we can focus on leveling up your ideas and maintaining that positive momentum. ";
  } else if (isOkay) {
    desc += "Dealing with everyday stress is totally normal, so we'll focus on keeping things balanced and manageable. ";
  } else if (isStudent && isBurntOut) {
    desc += "Navigating high-pressure academics while running on empty requires a careful approach. ";
  } else if (isStudent) {
    desc += "Academic pressure requires clear focus and strategy. ";
  } else if (isWorking && isBurntOut) {
    desc += "Balancing heavy daily responsibilities while feeling mentally exhausted means we need to pace things. ";
  } else if (isWorking) {
    desc += "Managing a demanding schedule requires efficiency and grounding. ";
  }

  // 2. Outline the AI's communication style
  if (traits.includes("support_solutions")) {
    desc += "Conversations will be highly actionable, offering practical, step-by-step plans rather than vague advice. ";
  } else if (traits.includes("support_tough_love")) {
    desc += "Expect direct, honest feedback to keep you accountable, without any sugarcoating. ";
  } else if (traits.includes("support_validation") || traits.includes("needs_venting")) {
    desc += "This will be a space to vent freely—focused on listening and validating your experience without rushing to 'fix' it. ";
  } else {
    desc += "The tone will remain adaptable, acting as a sounding board whenever you need one. ";
  }

  // 3. Acknowledge their coping mechanisms and psychology
  if (traits.includes("coping_isolate") || traits.includes("recharge_introvert") || traits.includes("self_guarded")) {
    desc += "Knowing that you recharge best in quiet, safe spaces, interactions here will always remain low-pressure and entirely on your terms.";
  } else if (traits.includes("coping_overwork") || traits.includes("self_driven")) {
    desc += "Because the instinct is often to overwork through stress, part of the process here will involve helping you recognize when it is time to step back.";
  } else if (traits.includes("decision_logical") || traits.includes("value_honesty")) {
    desc += "Challenges will be broken down analytically, keeping emotion from clouding logical decision-making.";
  } else if (traits.includes("value_independence") || traits.includes("decision_intuitive")) {
    desc += "You will be guided to find your own answers, respecting your fierce independence and intuition.";
  }

  return desc;
}

function finishOnboarding() {
  // 1. Initialize the expanded 12-profile scoreboard
  const scores = {
    gentle_crisis_listener: 0, direct_tough_love_coach: 0, solution_oriented_mentor: 0,
    burnout_recovery_guide: 0, empathetic_listener: 0, calming_grounding_assistant: 0,
    supportive_guide: 1, pragmatic_realist: 0, deep_reflector: 0,
    structured_planner: 0, gentle_motivator: 0, socratic_guide: 0
  };

  // 2. The Advanced AI Weighting Matrix
  const traitWeights = {
    "coping_process": { deep_reflector: 4, socratic_guide: 3, pragmatic_realist: 2 },
    "coping_talk": { empathetic_listener: 3, supportive_guide: 3, gentle_motivator: 1 },
    "coping_isolate": { gentle_crisis_listener: 3, deep_reflector: 2, calming_grounding_assistant: 1 },
    "coping_distract": { burnout_recovery_guide: 1, gentle_motivator: 2 },
    "coping_overwork": { burnout_recovery_guide: 4, structured_planner: 2, pragmatic_realist: 1 },
    "coping_anger": { calming_grounding_assistant: 3, socratic_guide: 1 },
    
    "recharge_introvert": { empathetic_listener: 2, deep_reflector: 3 },
    "recharge_extrovert": { supportive_guide: 2, gentle_motivator: 2 },
    "recharge_active": { solution_oriented_mentor: 2, structured_planner: 1 },
    "recharge_passive": { gentle_crisis_listener: 2, burnout_recovery_guide: 2 },

    "decision_logical": { solution_oriented_mentor: 4, pragmatic_realist: 3, direct_tough_love_coach: 2 },
    "decision_intuitive": { empathetic_listener: 2, deep_reflector: 3, socratic_guide: 2 },
    "decision_collaborative": { supportive_guide: 3, gentle_motivator: 2 },
    "decision_avoidant": { gentle_crisis_listener: 4, calming_grounding_assistant: 2 },

    "value_honesty": { direct_tough_love_coach: 4, pragmatic_realist: 3, socratic_guide: 1 },
    "value_loyalty": { supportive_guide: 2, gentle_motivator: 2 },
    "value_empathy": { empathetic_listener: 4, deep_reflector: 2 },
    "value_independence": { socratic_guide: 4, direct_tough_love_coach: 2 },

    "self_fixer": { solution_oriented_mentor: 3, structured_planner: 2 },
    "self_listener": { empathetic_listener: 3, deep_reflector: 2 },
    "self_driven": { structured_planner: 3, burnout_recovery_guide: 2 },
    "self_guarded": { gentle_crisis_listener: 3, socratic_guide: 2 },

    "energy_great": { gentle_motivator: 4, solution_oriented_mentor: 3, socratic_guide: 2 },
    "energy_okay": { supportive_guide: 4, pragmatic_realist: 3, deep_reflector: 2 },
    "energy_high_anxiety": { calming_grounding_assistant: 5, structured_planner: 2 },
    "energy_burnt_out": { burnout_recovery_guide: 5, gentle_motivator: 3 },
    "energy_empty": { gentle_crisis_listener: 6, burnout_recovery_guide: 2 },

    "support_solutions": { solution_oriented_mentor: 5, structured_planner: 4, pragmatic_realist: 2 },
    "support_validation": { empathetic_listener: 5, gentle_motivator: 3, deep_reflector: 2 },
    "support_tough_love": { direct_tough_love_coach: 6, pragmatic_realist: 3 },

    "growth_oriented": { solution_oriented_mentor: 4, gentle_motivator: 4, socratic_guide: 3 },
    "action_oriented": { solution_oriented_mentor: 4, pragmatic_realist: 3 },
    "needs_venting": { empathetic_listener: 4, deep_reflector: 2 },
    "crisis": { gentle_crisis_listener: 8 } 
  };

  // 3. Calculate scores based on combinations
  userTraits.forEach(trait => {
    if (traitWeights[trait]) {
      const weights = traitWeights[trait];
      for (const persona in weights) {
        scores[persona] += weights[persona];
      }
    }

    if (academicPressureTraits.has(trait)) {
      scores.structured_planner += 2;
      scores.solution_oriented_mentor += 1;
      scores.pragmatic_realist += 1;
    }
    if (practicalPathTraits.has(trait)) {
      scores.pragmatic_realist += 2;
      scores.solution_oriented_mentor += 1;
    }
    if (workingLifeTraits.has(trait)) {
      scores.pragmatic_realist += 1;
      scores.supportive_guide += 1;
    }
    if (familyLoadTraits.has(trait)) {
      scores.supportive_guide += 2;
      scores.burnout_recovery_guide += 1;
    }
    // Complex Permutations
    if (academicPressureTraits.has(trait) && userTraits.includes("support_solutions")) {
      scores.structured_planner += 4;
    }
    if (trait === "value_independence" && userTraits.includes("support_validation")) {
      scores.socratic_guide += 4;
    }
    if (trait === "decision_avoidant" && userTraits.includes("energy_empty")) {
      scores.gentle_crisis_listener += 4;
    }
  });

  // 4. Determine the winner
  let highestScore = -1;
  let winningPersona = "supportive_guide"; 

  for (const persona in scores) {
    if (scores[persona] > highestScore) {
      highestScore = scores[persona];
      winningPersona = persona;
    }
  }

  finalAIPersonality = winningPersona;

  console.log("Traits Collected:", userTraits);
  console.log("Scoreboard Calculation:", scores);
  console.log("Assigned AI Personality:", finalAIPersonality);
  
  showResultScreen();
}

function showResultScreen() {
  const questionContainer = document.getElementById('questionContainer');
  const resultContainer = document.getElementById('resultContainer');
  const skipButton = document.getElementById('skipBtn');
  
  // --- NEW: Generate the completely unique profile description ---
  const profileTitle = personalityProfiles[finalAIPersonality].title;
  const customDescription = generateDynamicDescription(finalAIPersonality, userTraits);
  
  document.getElementById('resultBadge').textContent = profileTitle;
  document.getElementById('resultDescription').textContent = customDescription;

  questionContainer.style.opacity = 0;
  skipButton.style.opacity = 0;

  setTimeout(() => {
    questionContainer.style.display = 'none';
    skipButton.style.display = 'none';
    
    resultContainer.style.display = 'flex';
  }, 200);
}

// --- NEW: Back Button Listener ---
document.getElementById('backBtn').addEventListener('click', () => {
  if (historyStack.length === 0) return; // Prevent going back from the very start
  
  // 1. If they are on the Results Screen, restore the Questions UI
  const resultContainer = document.getElementById('resultContainer');
  if (resultContainer.style.display === 'flex') {
    resultContainer.style.display = 'none';
    
    // Bring back the question container and skip button
    const questionContainer = document.getElementById('questionContainer');
    const skipBtn = document.getElementById('skipBtn');
    
    questionContainer.style.display = 'flex';
    skipBtn.style.display = 'block';
    
    // Restore their opacity so they are fully visible
    questionContainer.style.opacity = 1;
    skipBtn.style.opacity = 1;
  }

 // 2. Get the last state they were in
  const lastState = historyStack.pop();
  if (Object.prototype.hasOwnProperty.call(lastState, "previousCultureContext")) {
    userCultureContext = lastState.previousCultureContext;
  }
  
  // 3. Erase ALL traits they selected in that specific state
  lastState.traits.forEach(traitToRemove => {
    const traitIndex = userTraits.lastIndexOf(traitToRemove);
    if (traitIndex > -1) {
      userTraits.splice(traitIndex, 1);
    }
  });
  
  // 4. Rewind time and render that previous question again
  renderQuestion(lastState.id);
});

// Bind the new Start Chat button to actually close the modal
document.getElementById('startChatBtn').addEventListener('click', closeModal);

skipBtn.addEventListener('click', () => {
  finalAIPersonality = "emergency_crisis_listener"; 
  console.log("Skipped. Assigned AI Personality:", finalAIPersonality);
  closeModal();
});

function closeModal() {
  modalOverlay.classList.remove('active');
  setTimeout(() => {
    modalOverlay.style.display = 'none';
    const chatInput = document.querySelector(".composer-row input");
    if (chatInput && !mobileQuery.matches) {
      chatInput.focus();
    }
  }, 300);
}

// Trigger the questionnaire
startQuestionnaire();
