<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --surface: #0f1624;
      --surface-2: #121b2b;
      --line: rgba(148, 163, 184, 0.12);
      --line-strong: rgba(148, 163, 184, 0.2);
      --text: #edf3ff;
      --muted: #8fa0bd;
      --accent: #54d2ff;
      --accent-soft: rgba(84, 210, 255, 0.14);
      --user: linear-gradient(135deg, #68e1ff, #4aa8ff);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      --compact-pad: 15px;
      --compact-size: 40px;
      --compact-radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    html,
    body {
      height: 100%;
    }

    body {
      min-width: 320px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(84, 210, 255, 0.08), transparent 24%),
        linear-gradient(180deg, #080d16 0%, #0a0f1a 100%);
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: flex;
      gap: 14px;
      width: 100%;
      height: 100vh;
      padding: 14px;
    }

    .sidebar {
      width: 272px;
      flex: 0 0 272px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(10, 15, 26, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      z-index: 30;
      transition:
        width 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        flex-basis 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        padding 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar:not(.collapsed) {
      overflow: visible;
    }

    .sidebar.collapsed {
      width: calc((var(--compact-pad) * 2) + var(--compact-size) + 2px);
      flex-basis: calc((var(--compact-pad) * 2) + var(--compact-size) + 2px);
      padding: var(--compact-pad);
    }

    .sidebar-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-height: 42px;
      z-index: 70;
    }

    .sidebar.collapsed .sidebar-header {
      min-height: 40px;
    }

    .brand {
      position: absolute;
      left: 0;
      top: 50%;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 200px;
      min-width: 0;
      opacity: 1;
      transform: translateY(-50%) translateX(0);
      transition:
        opacity 0.18s ease,
        transform 0.24s ease;
    }

    .sidebar.collapsed .brand {
      opacity: 0;
      transform: translateY(-50%) translateX(-8px);
      pointer-events: none;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: #08111a;
      font-size: 0.95rem;
      font-weight: 800;
      background: linear-gradient(135deg, #7ae6ff, #4aa8ff);
    }

    .brand-text {
      min-width: 0;
      overflow: visible;
      white-space: nowrap;
      transition: opacity 0.16s ease, width 0.24s ease, margin 0.24s ease;
    }

    .sidebar.collapsed .brand-text {
      width: 0;
      margin: 0;
      opacity: 0;
      overflow: hidden;
    }

    .mode-dropdown {
      position: relative;
      display: inline-grid;
      align-items: center;
      z-index: 10;
    }

    .mode-dropdown.open {
      z-index: 60;
    }

    .mode-trigger,
    .mode-option {
      border: 0;
      outline: 0;
      font: inherit;
      cursor: pointer;
    }

    .mode-trigger {
      min-width: 124px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.02));
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      transition:
        color 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease,
        transform 0.18s ease;
    }

    .mode-trigger:hover,
    .mode-trigger:focus,
    .mode-dropdown.open .mode-trigger {
      border-color: rgba(84, 210, 255, 0.32);
      background:
        linear-gradient(180deg, rgba(84, 210, 255, 0.14), rgba(84, 210, 255, 0.045));
      transform: translateY(-1px);
    }

    .mode-label {
      display: inline-block;
      white-space: nowrap;
    }

    .mode-label.is-changing {
      animation: modeLabelChange 0.34s ease both;
    }

    .mode-chevron {
      width: 10px;
      height: 10px;
      display: inline-block;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      margin-left: 6px;
      transform: translateY(-2px) rotate(45deg);
      transition: transform 0.25s ease, border-color 0.2s ease;
    }

    .mode-dropdown.open .mode-chevron {
      border-color: var(--accent);
      transform: translateY(2px) rotate(-135deg);
    }

    .mode-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      min-width: 100%;
      padding: 6px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(18, 27, 43, 0.98), rgba(10, 15, 26, 0.98));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.96);
      transform-origin: top left;
      transition:
        opacity 0.2s ease,
        transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .mode-dropdown.open .mode-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .mode-option {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 9px;
      border-radius: 10px;
      color: var(--muted);
      background: transparent;
      font-size: 0.8rem;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      transform-origin: left center;
      transition:
        color 0.16s ease,
        transform 0.2s ease,
        background 0.16s ease,
        padding 0.16s ease;
    }

    .mode-option.active {
      color: var(--text);
      background: rgba(84, 210, 255, 0.08);
      padding: 6px 8px;
      border-radius: 8px;
    }

    .mode-option:hover {
      background: transparent;
      color: var(--text);
      transform: scale(1.06);
    }

    .mode-option.active::after {
      content: "";
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(84, 210, 255, 0.8);
    }

    @keyframes modeLabelChange {
      0% {
        opacity: 0;
        transform: translateY(5px);
        filter: blur(3px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    .toggle-button,
    .icon-button,
    .send-button,
    .new-chat,
    .chat-item {
      border: 0;
      outline: 0;
    }

    .toggle-button,
    .icon-button,
    .send-button {
      cursor: pointer;
    }

    .toggle-button {
      width: var(--compact-size);
      height: var(--compact-size);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: var(--compact-radius);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .new-chat {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      cursor: pointer;
      transform-origin: center;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .new-chat:hover {
      transform: scale(1.05);
      background: rgba(84, 210, 255, 0.1);
      border-color: rgba(84, 210, 255, 0.28);
    }

    .new-chat.active {
      background: rgba(84, 210, 255, 0.1);
      border-color: rgba(84, 210, 255, 0.28);
    }

    .new-chat-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--accent);
      font-size: 1rem;
      line-height: 1;
      transition: transform 0.2s ease;
    }

    .new-chat-text,
    .chat-copy {
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.16s ease, width 0.24s ease, margin 0.24s ease;
      will-change: transform;
    }

    .new-chat:hover .new-chat-icon,
    .new-chat:hover .new-chat-text {
      transform: scale(1.08);
    }

    .new-chat-text {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .sidebar.collapsed .new-chat {
      justify-content: center;
      width: var(--compact-size);
      height: var(--compact-size);
      min-height: var(--compact-size);
      padding: 0;
      gap: 0;
      align-self: center;
      border-radius: var(--compact-radius);
    }

    .sidebar.collapsed .new-chat-text,
    .sidebar.collapsed .chat-copy {
      width: 0;
      margin: 0;
      opacity: 0;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1; /* Tells it to take up remaining vertical space */
      min-height: 0; /* Crucial rule to allow scrolling inside flexbox */
    }

    .section-label {
      padding: 0 4px;
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: opacity 0.16s ease, max-height 0.24s ease, margin 0.24s ease;
      overflow: hidden;
      max-height: 20px;
    }

    .sidebar.collapsed .section-label {
      opacity: 0;
      max-height: 0;
      margin: 0;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      overflow-x: hidden; /* FIX: Kills the horizontal scrollbar */
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(143, 160, 189, 0.45) transparent;
    }

    /* Optional: Custom scrollbar styling for the sidebar to match the main chat */
    .chat-list::-webkit-scrollbar {
      width: 4px;
    }
    .chat-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-list::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(143, 160, 189, 0.42);
    }

    .sidebar.collapsed .chat-list {
      align-items: center; /* FIX: Centers items perfectly in flexbox */
      padding-right: 0;    /* FIX: Removes scrollbar padding so icons stay centered */
      overflow-x: hidden;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      border: 1px solid transparent;
    }

    .chat-item:hover,
    .chat-item.active {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--line);
    }

    .sidebar.collapsed .chat-item {
      justify-content: center;
      align-items: center;
      width: var(--compact-size);
      height: var(--compact-size);
      min-height: var(--compact-size);
      margin: 0 auto;
      padding: 0;
      gap: 0;
      background: transparent;
      border-color: transparent;
      border-radius: var(--compact-radius);
      transition: transform 0.18s ease;
    }

    .sidebar.collapsed .chat-copy {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .sidebar.collapsed .chat-item.active,
    .sidebar.collapsed .chat-item:hover {
      background: transparent;
      border-color: transparent;
    }

    .chat-icon {
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 0.86rem;
      transition: transform 0.2s ease, filter 0.2s ease, width 0.18s ease, height 0.18s ease;
    }

    .sidebar.collapsed .chat-item .chat-icon {
      width: 38px; 
      height: 38px;
      font-size: 0.9rem;
    }

    .sidebar.collapsed .chat-item.active .chat-icon,
    .sidebar.collapsed .chat-item:hover .chat-icon {
      transform: translateY(-1px) scale(1.05); 
      filter: brightness(1.15);
    }

    .chat-copy {
      min-width: 0; /* Prevents the text from stretching the parent box */
      flex: 1;
    }

    .chat-copy strong {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis; /* Adds the ... */
      white-space: nowrap;
    }

    .chat-copy span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.8rem;
      overflow: hidden;
      text-overflow: ellipsis; /* Adds the ... */
      white-space: nowrap;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(15, 22, 36, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 20;
    }

    .topbar-toggle {
      display: none; /* Hidden on desktop */
    }

    .topbar-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .title-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }

    .topbar h1 {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: clamp(1.45rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .topbar-mode {
      margin-top: 0;
      flex: 0 0 auto;
    }

    .topbar-mode .mode-trigger {
      min-width: 122px;
      padding: 5px 9px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .topbar-mode .mode-trigger:hover,
    .topbar-mode .mode-trigger:focus,
    .topbar-mode.open .mode-trigger {
      color: var(--text);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .topbar-mode .mode-menu {
      min-width: 134px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .search-container {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 12px;
      height: 40px;
      width: 40px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-container.active {
      width: 220px;
      border-radius: 20px;
    }

    .search-container .icon-button {
  width: 38px;
  height: 38px;
  flex: 0 0 38px;
  background: transparent;
  border: none;

  display: flex;              /* change this */
  align-items: center;        /* vertical center */
  justify-content: center;    /* horizontal center */

  padding: 0;
  margin: 0;

  
  line-height: 1;


}
    .search-input {
      flex: 1;
      min-width: 0;
      width: 0; /* Prevents the hidden input from pushing the icon */
      opacity: 0;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: opacity 0.2s ease;
      padding: 0;
    }

    .search-container.active .search-input {
      opacity: 1;
      padding: 0 12px;
      width: auto;
    }

    @media (max-width: 640px) {
      .search-container.active {
        width: 160px; /* Slightly smaller expansion on phones */
      }
    }

    .search-highlight {
      background-color: var(--accent-soft);
      color: var(--accent);
      border-radius: 3px;
      padding: 0 2px;
      transition: all 0.2s;
    }

    .search-highlight.active-match {
      background-color: var(--accent);
      color: #08111a;
      box-shadow: 0 0 8px var(--accent-soft);
    }

    /* Better visibility for highlights inside user text bubbles */
    .message-row.user .search-highlight {
      background-color: rgba(0, 0, 0, 0.25);
      color: #fff;
    }

    .message-row.user .search-highlight.active-match {
      background-color: #fff;
      color: #000;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
    }

    .search-navigator {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15, 22, 36, 0.98);
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow);
    }

    .search-navigator.visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .search-count {
      font-size: 0.9rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .nav-btn {
      width: 28px;
      height: 28px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scrollbar-gutter: stable both-edges;
      scrollbar-width: thin;
      scrollbar-color: rgba(143, 160, 189, 0.45) transparent;
      transform-origin: center;
      will-change: transform, opacity, filter;
    }

    .messages.start-mode {
      overflow: hidden;
      padding-top: 16px;
      padding-bottom: 16px;
      scrollbar-gutter: auto;
    }

    .messages.start-mode::-webkit-scrollbar {
      display: none;
    }

    .messages.exit-to-back {
      animation: exitToBack 0.34s cubic-bezier(0.7, 0, 0.84, 0) both;
    }

    .messages.enter-from-bottom {
      animation: enterFromBottom 0.68s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .messages.enter-from-top {
      animation: enterFromTop 0.68s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes exitToBack {
      from {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        filter: blur(8px);
        transform: translateY(8px) scale(0.88);
      }
    }

    @keyframes enterFromBottom {
      from {
        opacity: 0;
        filter: blur(5px);
        transform: translateY(120%) scale(0.96);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
      }
    }

    @keyframes enterFromTop {
      from {
        opacity: 0;
        filter: blur(5px);
        transform: translateY(-120%) scale(0.96);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
      }
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: rgba(143, 160, 189, 0.42);
      background-clip: padding-box;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(143, 160, 189, 0.6);
      background-clip: padding-box;
    }

    .date-label {
      align-self: center;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .start-screen {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 8px 0;
    }

    .start-panel {
      width: min(720px, 100%);
      display: grid;
      gap: 16px;
      text-align: center;
    }

    .start-panel h2 {
      font-size: clamp(1.9rem, 4.5vw, 3.15rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .start-panel p {
      max-width: 520px;
      justify-self: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .starter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .starter-prompt {
      min-height: 62px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;

/* --- 3D Rotating Text Animation --- */
.rotating-text {
  display: inline-block;
  transform-origin: 50% 50% -15px; 
  transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.5s ease;
  transform-style: preserve-3d;
}

.rotating-text.roll-out {
  transform: perspective(600px) rotateX(90deg);
  opacity: 0;
}

.rotating-text.roll-in {
  animation: rollInEffect 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
}

@keyframes rollInEffect {
  0% {
    transform: perspective(600px) rotateX(-90deg);
    opacity: 0;
  }
  100% {
    transform: perspective(600px) rotateX(0deg);
    opacity: 1;
  }
}

    function closeSearch() {
      searchContainer.classList.remove('active');
      searchInput.value = '';
      searchToggleBtn.style.display = 'flex';
      searchCloseBtn.style.display = 'none';
      clearHighlights();
      hideNavigator();
    }

    searchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.trim();
      if (keyword.length < 2) {
        clearHighlights();
        hideNavigator();
        return;
      }
      performSearch(keyword);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        searchNextBtn.click();
      } else if (e.key === 'Escape') {
        closeSearch();
      }
    });

    function performSearch(keyword) {
      clearHighlights();
      if (!keyword) return;

      const walker = document.createTreeWalker(
        messagesContainer,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode: function(node) {
            if (node.parentNode.nodeName === 'SCRIPT' || 
                node.parentNode.nodeName === 'STYLE' || 
                node.parentNode.classList.contains('search-highlight')) {
              return NodeFilter.FILTER_REJECT;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        }
      );

      const nodesToReplace = [];
      let node;
      while ((node = walker.nextNode())) {
        if (node.nodeValue.toLowerCase().includes(keyword.toLowerCase())) {
          nodesToReplace.push(node);
        }
      }

      searchMatches = [];
      
      nodesToReplace.forEach(textNode => {
        const text = textNode.nodeValue;
        const regex = new RegExp(`(${escapeRegExp(keyword)})`, 'gi');
        const fragment = document.createDocumentFragment();
        
        let lastIndex = 0;
        text.replace(regex, (match, p1, offset) => {
          fragment.appendChild(document.createTextNode(text.slice(lastIndex, offset)));
          
          const mark = document.createElement('mark');
          mark.className = 'search-highlight';
          mark.textContent = match;
          fragment.appendChild(mark);
          searchMatches.push(mark);
          
          lastIndex = offset + match.length;
        });
        
        fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
        textNode.parentNode.replaceChild(fragment, textNode);
      });

      if (searchMatches.length > 0) {
        currentMatchIndex = 0;
        updateSearchNavigator();
        highlightCurrentMatch();
      } else {
        hideNavigator();
      }
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function clearHighlights() {
      const marks = messagesContainer.querySelectorAll('mark.search-highlight');
      marks.forEach(mark => {
        const parent = mark.parentNode;
        if (parent) {
          parent.replaceChild(document.createTextNode(mark.textContent), mark);
          parent.normalize();
        }
      });
      searchMatches = [];
      currentMatchIndex = -1;
    }

    function updateSearchNavigator() {
      if (searchMatches.length > 0) {
        searchNavigator.classList.add('visible');
        searchCount.textContent = `${currentMatchIndex + 1} / ${searchMatches.length}`;
      } else {
        hideNavigator();
      }
    }

    function hideNavigator() {

// --- Chat Interaction Logic ---
const chatInput = document.querySelector(".composer-row input");
const sendBtn = document.querySelector(".send-button");

function appendMessage(messageObj) {
  if (messages.classList.contains("start-mode")) {
    clearInterval(rotateInterval);
    messages.classList.remove("start-mode");
    messages.innerHTML = '<div class="date-label">Today</div>';
  }
  messages.insertAdjacentHTML("beforeend", createMessage(messageObj));
  messages.scrollTop = messages.scrollHeight;
}

function handleSendMessage() {
  const text = chatInput.value.trim();
  if (!text) return; 

  chatInput.value = ""; 

  if (currentChatIndex === -1) {
    startScreenDraft = "";
  } else {
    conversations[currentChatIndex].draft = "";
  }

  // --- NEW: Grab the current real time ---
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

  // --- NEW: Create unique IDs for the timestamps ---
  const userMsgId = "msg-user-" + Date.now();
  const botMsgId = "msg-bot-" + Date.now();

  // Create the objects, storing both "Just now" and the "Real Time"
  const userMsg = { 
    who: "user", 
    name: "You", 
    text: text, 
    meta: "You • Just now", 
    id: userMsgId,
    realTime: `You • ${timeStr}`
  };
  
  const botMsg = { 
    who: "bot", 
    name: "AI", 
    text: "AI has not been integrated into me yet", 
    meta: "AI • Just now", 
    id: botMsgId,
    realTime: `AI • ${timeStr}`
  };

  // Check if this is a brand new chat (Start screen)
  if (currentChatIndex === -1) {
    // Grab the first 5 words for the title
    const words = text.split(/\s+/);
    const generatedTitle = words.slice(0, 5).join(" ") + (words.length > 5 ? "..." : "");

    // Create the new conversation object
    const newConv = {
      title: generatedTitle,
      messages: []
    };

    // Add it to the top of our array
    conversations.unshift(newConv);
    currentChatIndex = 0;
    
    // Update the UI
    renderSidebarList();
    setActiveChat(currentChatIndex);
    conversationTitle.textContent = generatedTitle;
    fitConversationTitle();
  } else {
    // If it's an existing chat, move it to the top of the list!
    if (currentChatIndex > 0) {
      const activeConv = conversations.splice(currentChatIndex, 1)[0];
      conversations.unshift(activeConv);
      currentChatIndex = 0; 
    }
  }

  // 1. Show and save the user's message
  appendMessage(userMsg);
  conversations[currentChatIndex].messages.push(userMsg);
  
  // Re-render sidebar immediately to show user text preview and new order
  renderSidebarList(); 

  // --- NEW: 60-Second Timer for User Message ---
  setTimeout(() => {
    userMsg.meta = userMsg.realTime; // Update data layer
    const el = document.getElementById(userMsgId);
    if (el) el.textContent = userMsg.realTime; // Update visual layer
  }, 60000); 

  // 2. Show and save the bot's response after a delay
  setTimeout(() => {
    appendMessage(botMsg);
    conversations[currentChatIndex].messages.push(botMsg);
    
    // Re-render sidebar again to show bot text preview
    renderSidebarList(); 

    // --- NEW: 60-Second Timer for Bot Message ---
    setTimeout(() => {
      botMsg.meta = botMsg.realTime; // Update data layer
      const el = document.getElementById(botMsgId);
      if (el) el.textContent = botMsg.realTime; // Update visual layer
    }, 60000); 

  }, 600);
}

let userTraits = [];
let finalAIPersonality = "";
let userAge = 0; 

function startQuestionnaire() {
  renderQuestion("q_age");
}

function renderQuestion(questionId) {
  const q = questionBank[questionId];
  
  questionText.style.opacity = 0;
  optionsContainer.style.opacity = 0;

  setTimeout(() => {
    questionText.textContent = q.question;
    optionsContainer.innerHTML = "";
    
    if (q.type === "mcq") {
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'mcq-option';
        btn.type = 'button';
        btn.textContent = opt.text;
        
        btn.onclick = () => {
          userTraits.push(opt.trait);
          if (opt.nextId) {
            renderQuestion(opt.nextId);
          } else {
            finishOnboarding();
          }
        };
        optionsContainer.appendChild(btn);
      });

    } else if (q.type === "slider") {
      optionsContainer.innerHTML = `
        <div class="slider-container">
          <div class="slider-value-display" id="sliderValue">${q.defaultVal}</div>
          <input type="range" min="${q.min}" max="${q.max}" value="${q.defaultVal}" class="custom-slider" id="ageSlider">
          <button class="next-btn" id="sliderNextBtn">Continue</button>
        </div>
      `;

      const slider = document.getElementById('ageSlider');
      const display = document.getElementById('sliderValue');
      const nextBtn = document.getElementById('sliderNextBtn');

      slider.addEventListener('input', (e) => {
        let val = e.target.value;
        display.textContent = val == 90 ? "90+" : val;
      });

      nextBtn.addEventListener('click', () => {
        userAge = parseInt(slider.value);
        userTraits.push(`age_${userAge}`); 
        
        const nextId = q.getNextId(userAge);
        renderQuestion(nextId);
      });
    }

    questionText.style.transition = "opacity 0.2s";
    optionsContainer.style.transition = "opacity 0.2s";
    questionText.style.opacity = 1;
    optionsContainer.style.opacity = 1;
  }, 200);
}

function finishOnboarding() {
  const traits = userTraits.join(" ");

  // Deep Psychological Hierarchy
  
  // 1. Extreme Crisis / Avoidant Guarded Profile
  if (traits.includes("crisis") || traits.includes("energy_empty") || (traits.includes("decision_avoidant") && traits.includes("self_guarded"))) {
    finalAIPersonality = "gentle_crisis_listener"; 
    
  // 2. High Logic / Tough Love Profile
  } else if (traits.includes("support_tough_love") || (traits.includes("decision_logical") && traits.includes("value_honesty"))) {
    finalAIPersonality = "direct_tough_love_coach";
    
  // 3. Driven / Fixer / Solution Profile (Academic or Career)
  } else if ((traits.includes("jee_prep") || traits.includes("neet_prep") || traits.includes("career_focused") || traits.includes("self_driven") || traits.includes("self_fixer")) && traits.includes("support_solutions")) {
    finalAIPersonality = "solution_oriented_mentor"; 
    
  // 4. Overworked / Burnout Profile
  } else if (traits.includes("coping_overwork") && traits.includes("action_oriented")) {
    finalAIPersonality = "burnout_recovery_guide";
    
  // 5. High Empathy / Validation Profile
  } else if (traits.includes("needs_venting") || traits.includes("support_validation") || traits.includes("value_empathy") || traits.includes("self_listener")) {
    finalAIPersonality = "empathetic_listener";
    
  // 6. High Anxiety / Grounding Profile
  } else if (traits.includes("energy_high_anxiety")) {
     finalAIPersonality = "calming_grounding_assistant";
     
  // 7. Default Safe Fallback
  } else {
    finalAIPersonality = "supportive_guide";
  }
  
  console.log("Traits Collected:", userTraits);
  console.log("Assigned AI Personality:", finalAIPersonality);
  closeModal();
}

skipBtn.addEventListener('click', () => {
  finalAIPersonality = "emergency_crisis_listener"; 
  console.log("Skipped. Assigned AI Personality:", finalAIPersonality);
  closeModal();
});

function closeModal() {
  modalOverlay.classList.remove('active');
  setTimeout(() => {
    modalOverlay.style.display = 'none';
    const chatInput = document.querySelector(".composer-row input");
    if(chatInput) chatInput.focus();
  }, 300);
}

// Trigger the questionnaire
startQuestionnaire();
